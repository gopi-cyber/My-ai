<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS Awareness</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: rgba(15, 15, 25, 0.92);
    --surface: rgba(25, 25, 40, 0.95);
    --border: rgba(0, 212, 255, 0.15);
    --accent: #00d4ff;
    --accent-dim: rgba(0, 212, 255, 0.3);
    --text: #e0e0e0;
    --text-dim: #808090;
    --text-muted: #505060;
    --success: #4caf50;
    --warning: #f59e0b;
    --error: #ef4444;
  }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }

  .overlay {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 10px;
    gap: 8px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 2px;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
  }

  .header .logo {
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
  }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    display: inline-block; margin-right: 4px; vertical-align: middle;
  }
  .status-dot.active {
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.inactive { background: var(--text-muted); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .context {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
  }
  .context-app {
    font-weight: 600; color: var(--accent); font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .context-window {
    color: var(--text-dim); font-size: 10px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .context-session { color: var(--text-muted); font-size: 9px; margin-top: 3px; }

  /* Tip panel */
  .tip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    flex: 1;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .tip.visible { opacity: 1; transform: translateY(0); }

  .tip-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

  .tip-type {
    display: inline-block; font-size: 8px; padding: 1px 5px;
    border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tip-type.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
  .tip-type.stuck { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
  .tip-type.general { background: rgba(0, 212, 255, 0.15); color: var(--accent); }

  .tip-title { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .tip-body {
    font-size: 10px; color: var(--text-dim); line-height: 1.4;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    flex: 1;
  }

  /* Action buttons */
  .tip-actions {
    display: flex; gap: 6px; margin-top: 6px;
    -webkit-app-region: no-drag;
  }

  .tip-btn {
    flex: 1; padding: 5px 0; border-radius: 5px;
    border: none; cursor: pointer; font-size: 10px; font-weight: 600;
    transition: all 0.15s ease;
  }
  .tip-btn:active { transform: scale(0.96); }

  .tip-btn.primary {
    background: var(--accent); color: #0a0a15;
  }
  .tip-btn.primary:hover { background: #33dfff; }

  .tip-btn.secondary {
    background: rgba(255,255,255,0.06); color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tip-btn.secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .tip-btn.sent {
    background: rgba(76, 175, 80, 0.15); color: var(--success);
    pointer-events: none;
  }

  .empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 10px; font-style: italic;
  }
</style>
</head>
<body>
<div class="overlay" id="app">
  <div class="header">
    <span class="logo">JARVIS</span>
    <span>
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">connecting...</span>
    </span>
  </div>

  <div class="context" id="contextPanel">
    <div class="context-app" id="ctxApp">--</div>
    <div class="context-window" id="ctxWindow">--</div>
    <div class="context-session" id="ctxSession"></div>
  </div>

  <div id="tipContainer">
    <div class="empty" id="emptyState">Watching for tips...</div>
  </div>
</div>

<script>
  const WS_RECONNECT_MS = 3000;
  const CONTEXT_POLL_MS = 5000;
  const TIP_DISPLAY_MS = 60000;

  let ws = null;
  let contextTimer = null;
  let tipDismissTimer = null;
  let lastTipContext = null;

  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws`);

    ws.onopen = () => {
      setStatus(true);
      pollContext();
    };
    ws.onclose = () => {
      setStatus(false);
      setTimeout(connectWS, WS_RECONNECT_MS);
    };
    ws.onerror = () => setStatus(false);

    ws.onmessage = (event) => {
      if (event.data instanceof ArrayBuffer) return;
      try {
        const msg = JSON.parse(event.data);

        // Proactive chat messages (suggestions + error solutions)
        if (msg.type === 'chat' && msg.payload?.source === 'proactive') {
          const title = extractTitle(msg.payload.text);
          const body = extractBody(msg.payload.text);
          const isError = msg.priority === 'urgent' || title.toLowerCase().includes('error') || title.toLowerCase().includes('fix');
          showTip({
            id: msg.id,
            title,
            body,
            type: isError ? 'error' : 'general',
            context: msg.payload,
          });
        }

        // Awareness suggestion events (more structured)
        if (msg.type === 'notification' && msg.payload?.source === 'awareness_event') {
          const ev = msg.payload.event;
          if (ev?.type === 'suggestion_ready') {
            showTip({
              id: ev.data.id,
              title: ev.data.title,
              body: ev.data.body,
              type: ev.data.type || 'general',
              context: ev.data,
            });
          }
        }
      } catch { /* ignore */ }
    };
  }

  // --- Send a chat message to JARVIS ---
  function sendChat(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const msg = {
      type: 'chat',
      payload: { text },
      id: crypto.randomUUID(),
      timestamp: Date.now(),
    };
    ws.send(JSON.stringify(msg));
  }

  // --- Dismiss suggestion via API ---
  function dismissSuggestion(id) {
    if (!id) return;
    fetch(`/api/awareness/suggestions/${id}/dismiss`, { method: 'PATCH' }).catch(() => {});
  }

  // --- Act on suggestion via API ---
  function actOnSuggestion(id) {
    if (!id) return;
    fetch(`/api/awareness/suggestions/${id}/act`, { method: 'PATCH' }).catch(() => {});
  }

  function pollContext() {
    clearInterval(contextTimer);
    fetchContext();
    contextTimer = setInterval(fetchContext, CONTEXT_POLL_MS);
  }

  async function fetchContext() {
    try {
      const resp = await fetch('/api/awareness/status');
      if (!resp.ok) return;
      const data = await resp.json();
      const ctx = data.liveContext;
      if (ctx) {
        document.getElementById('ctxApp').textContent = ctx.currentApp || '--';
        document.getElementById('ctxWindow').textContent = ctx.currentWindow || '--';
        const session = ctx.sessionTopic || (ctx.sessionDuration ? `Session: ${Math.round(ctx.sessionDuration / 60000)}min` : '');
        document.getElementById('ctxSession').textContent = session;
      }
    } catch { /* ignore */ }
  }

  function setStatus(connected) {
    document.getElementById('statusDot').className = `status-dot ${connected ? 'active' : 'inactive'}`;
    document.getElementById('statusText').textContent = connected ? 'active' : 'offline';
  }

  // --- Tip display with action buttons ---
  function showTip(tip) {
    const container = document.getElementById('tipContainer');
    const empty = document.getElementById('emptyState');
    if (empty) empty.style.display = 'none';
    if (tipDismissTimer) clearTimeout(tipDismissTimer);

    lastTipContext = tip.context;

    // Remove existing tip
    const existing = container.querySelector('.tip');
    if (existing) existing.remove();

    // Pick action buttons based on tip type
    const actions = getActions(tip);

    const el = document.createElement('div');
    el.className = 'tip';
    el.innerHTML = `
      <div class="tip-header">
        <span class="tip-type ${tip.type}">${escapeHtml(tip.type)}</span>
      </div>
      <div class="tip-title">${escapeHtml(tip.title)}</div>
      <div class="tip-body">${escapeHtml(tip.body)}</div>
      <div class="tip-actions" id="tipActions"></div>
    `;

    container.appendChild(el);

    // Add buttons
    const actionsDiv = el.querySelector('#tipActions');
    actions.forEach(action => {
      const btn = document.createElement('button');
      btn.className = `tip-btn ${action.style}`;
      btn.textContent = action.label;
      btn.onclick = (e) => {
        e.stopPropagation();
        action.handler(tip, btn);
      };
      actionsDiv.appendChild(btn);
    });

    // Animate in
    requestAnimationFrame(() => {
      requestAnimationFrame(() => el.classList.add('visible'));
    });

    // Auto-dismiss after timeout
    tipDismissTimer = setTimeout(() => removeTip(el), TIP_DISPLAY_MS);
  }

  function removeTip(el) {
    const container = document.getElementById('tipContainer');
    const empty = document.getElementById('emptyState');
    el.classList.remove('visible');
    setTimeout(() => {
      el.remove();
      if (!container.querySelector('.tip') && empty) empty.style.display = '';
    }, 400);
  }

  function getActions(tip) {
    const type = tip.type;

    if (type === 'error') {
      return [
        {
          label: 'Fix it',
          style: 'primary',
          handler: (t, btn) => {
            const errorText = t.context?.errorText || t.context?.text || t.body;
            sendChat(`Yes, please help me fix this error: ${errorText.slice(0, 150)}`);
            actOnSuggestion(t.id);
            btn.textContent = 'On it!';
            btn.className = 'tip-btn sent';
          }
        },
        {
          label: 'Dismiss',
          style: 'secondary',
          handler: (t, btn) => {
            dismissSuggestion(t.id);
            removeTip(btn.closest('.tip'));
          }
        },
      ];
    }

    if (type === 'stuck') {
      return [
        {
          label: 'Help me',
          style: 'primary',
          handler: (t, btn) => {
            const appName = t.context?.appName || '';
            const windowTitle = t.context?.windowTitle || '';
            sendChat(`I'm stuck in ${appName} (${windowTitle}). Can you help me figure out what to do next?`);
            actOnSuggestion(t.id);
            btn.textContent = 'On it!';
            btn.className = 'tip-btn sent';
          }
        },
        {
          label: "I'm fine",
          style: 'secondary',
          handler: (t, btn) => {
            dismissSuggestion(t.id);
            removeTip(btn.closest('.tip'));
          }
        },
      ];
    }

    // General / break / cloud insight
    return [
      {
        label: 'Tell me more',
        style: 'primary',
        handler: (t, btn) => {
          sendChat(`Tell me more about: ${t.title}. ${t.body.slice(0, 100)}`);
          actOnSuggestion(t.id);
          btn.textContent = 'Sent!';
          btn.className = 'tip-btn sent';
        }
      },
      {
        label: 'Got it',
        style: 'secondary',
        handler: (t, btn) => {
          dismissSuggestion(t.id);
          removeTip(btn.closest('.tip'));
        }
      },
    ];
  }

  function extractTitle(text) {
    const match = text.match(/\*\*(.+?)\*\*/);
    return match ? match[1] : 'JARVIS Tip';
  }

  function extractBody(text) {
    return text.replace(/\*\*(.+?)\*\*\n?/, '').trim();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  connectWS();
</script>
</body>
</html>
