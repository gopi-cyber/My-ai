feature:
  - head-branch: ['^feat/', '^feature/']

bug:
  - head-branch: ['^fix/', '^bug/', '^hotfix/']

infrastructure:
  - head-branch: ['^infra/', '^ci/', '^devops/']
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'Dockerfile'
          - 'docker-compose*.yml'

sidecar:
  - changed-files:
      - any-glob-to-any-file:
          - 'sidecar/**'

ui:
  - changed-files:
      - any-glob-to-any-file:
          - 'ui/**'

packaging:
  - head-branch: ['^packaging/', '^npm/', '^release/']
  - changed-files:
      - any-glob-to-any-file:
          - 'sidecar/npm/**'
          - 'package.json'
          - 'install.sh'

security:
  - head-branch: ['^security/', '^sec/']

performance:
  - head-branch: ['^perf/', '^performance/']

refactoring:
  - head-branch: ['^refactor/', '^refactoring/']

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'
