  ---

  ### TASK: Create a simple event (THE ONLY acceptable path — URL prefill)
  Use this recipe for ANY "create/add/schedule/book X at TIME" request.

  BEFORE you start: resolve the user's intent to concrete values.
  - **Title**: from the user's phrase ("Meeting with Guglielmo" → `Meeting with Guglielmo`).
  - **Date**: convert relative phrases ("next Monday", "tomorrow", "14 April") to an absolute `YYYYMMDD`. If the user says a day-of-week, compute the actual calendar date — VERIFY the day-of-week matches by checking today's date from the system context. If it does not match (e.g. user says "Monday April 14" but April 14 is a Tuesday), ASK the user which they meant before proceeding. Do NOT silently pick one.
  - **Start/end time**: convert to `HHmmss`. Default duration = 1 hour if not specified.
  - **Timezone**: use the user's known timezone. If unknown, omit `ctz` and Calendar will use the account default.

  Then execute:
  1. Build the URL:
     `https://calendar.google.com/calendar/u/0/r/eventedit?text=URLENCODED_TITLE&dates=YYYYMMDDTHHmmSS/YYYYMMDDTHHmmSS[&ctz=IANA_TZ][&location=URLENCODED_LOC][&add=email1,email2][&details=URLENCODED_DESC][&recur=URLENCODED_RRULE]`
  2. `browser_navigate` to the URL.
  3. `browser_snapshot` — verify: URL contains `/r/eventedit`, AND the main region has a descriptive aria description (the event-editor one), AND there is a `<textbox>` in the main region whose current value equals your intended title. If any of those are wrong, STOP — do not save, report the state to the user.
  4. `browser_type` a Ctrl+Enter keystroke (or whichever save key your tool supports for full-editor Ctrl+Enter). Locale-independent.
  5. `browser_snapshot` — verify the URL has CHANGED (no longer contains `/r/eventedit`). URL change is the authoritative signal that save succeeded. A confirmation toast will usually also appear in a `live="polite"` generic, but do not depend on its text.

  That's 4 tool calls, maximum. If you exceed this, you have departed from the recipe — stop and re-read.

  ### TASK: Create an all-day event
  Same as above but use date-only format:
  - `dates=YYYYMMDD/YYYYMMDD` (end date is EXCLUSIVE — for a single-day all-day event use the next day as the end).
  - Example for all day on 14 April 2026: `dates=20260414/20260415`

  ### TASK: Create a recurring event
  Same URL prefill approach plus `recur=RRULE:...`:
  - Weekly on Monday, Wednesday, Friday: `recur=RRULE:FREQ=WEEKLY;BYDAY=MO,WE,FR`
  - Daily for 10 occurrences: `recur=RRULE:FREQ=DAILY;COUNT=10`
  - Every Tuesday until end of year: `recur=RRULE:FREQ=WEEKLY;BYDAY=TU;UNTIL=20261231T000000Z`
  URL-encode the `recur` value — `:` becomes `%3A`, `;` becomes `%3B`, `=` becomes `%3D`.

  ### TASK: Check today's events
  1. `browser_navigate` to `https://calendar.google.com/calendar/u/0/r/day`
  2. `browser_snapshot`
  3. Read the `<main description="DATE, N eventi">` heading for the count, then list the event button aria-labels. Each label has the format "START to END, TITLE, …, DATE".
  4. Report back.

  ### TASK: Check this week's events
  1. `browser_navigate` to `https://calendar.google.com/calendar/u/0/r/week`
  2. `browser_snapshot` — read event buttons grouped under each columnheader.

  ### TASK: Check a specific day's events
  1. `browser_navigate` to `/calendar/u/0/r/day/YYYY/M/D` (no leading zeros — e.g. `/r/day/2026/4/14`)
  2. `browser_snapshot`
  3. Read events.

  ### TASK: Check events on a specific week/month
  - Week: `/calendar/u/0/r/week/YYYY/M/D`
  - Month: `/calendar/u/0/r/month/YYYY/M/D`

  ### TASK: Check upcoming agenda (list view)
  1. `browser_navigate` to `/calendar/u/0/r/agenda`
  2. `browser_snapshot` — events appear as a flat list grouped by day.

  ### TASK: Find an event by keyword (search)
  1. `browser_navigate` to `https://calendar.google.com/calendar/u/0/r/search?q=URL_ENCODED_QUERY`
  2. `browser_snapshot`
  3. Read the main description ("Search results. N events found.") and the result buttons. Each result has the standard aria-label pattern.
  4. To open a specific result, click its event `<button>`.

  ### TASK: Find an event by date + title
  Prefer navigating to the day: `/r/day/YYYY/M/D`, snapshot, then match by title substring in the event button aria-labels. Search (`/r/search`) is a fallback if you don't know the date.

  ### TASK: Open and read an event's full details
  1. Navigate to the day/week containing the event.
  2. `browser_snapshot`
  3. `browser_click` the event `<button>` — the peek popup dialog appears.
  4. `browser_snapshot` — the dialog name = event title; read date/time/organizer/reminder from the StaticText children.
  5. For full details (description, guests), click `<button "Modifica evento">` / "Edit event" to navigate to the full editor, then snapshot.

  ### TASK: Delete an event (FASTEST — keyboard)
  1. Navigate to the day/week containing the event.
  2. `browser_snapshot`
  3. `browser_click` the target event `<button>` — this focuses it AND opens the peek popup.
  4. `browser_click` the peek's `<button "Elimina evento">` / "Delete event".
  5. `browser_snapshot` — confirm toast `"Evento eliminato"` / "Event deleted" appears.

  Alternative using keyboard (if event is already focused after a prior action):
  1. Press `Backspace` — deletes immediately, no confirmation.
  2. `browser_snapshot` — confirm toast.

  ### TASK: Edit an event (change title, time, guests, etc.)
  1. Navigate to the day containing the event.
  2. `browser_snapshot`
  3. `browser_click` the event `<button>` — peek opens.
  4. `browser_click` `<button "Modifica evento">` / "Edit event" — full editor opens.
  5. `browser_snapshot` — confirm you're in the editor (URL contains /r/eventedit/BASE64).
  6. Edit fields:
     - Title: click `<textbox "Titolo">`, Ctrl+A, type new value.
     - Start/end date: click `<textbox "Data inizio">` / "Data fine", Ctrl+A, type `D/M/YYYY` + Enter.
     - Start/end time: click the `<combobox>` and type the new time ("3:00PM") or select from the list.
     - Guests: click `<combobox "Invitati">`, type email, press Enter (submit:true). Repeat per guest.
     - Description: click `<textbox "Descrizione">`, type.
     - Location: click `<combobox "Aggiungi posizione">`, type.
  7. Press `Ctrl+Enter` OR click `<button "Salva">` / "Save".
  8. `browser_snapshot` — confirm toast.

  ### TASK: Reschedule an event (move to a new time)
  Use TASK "Edit an event" above. Change start date, start time, end date, end time. Save.

  ### TASK: Add guests to an existing event
  Use TASK "Edit an event". In the full editor:
  1. Click `<combobox "Invitati">` / "Guests".
  2. `browser_type` each email address with submit:true — each becomes a chip.
  3. Save.

  ### TASK: Add a Google Meet link to an existing event
  1. Open event in full editor (Edit flow above).
  2. `browser_click` `<button "Aggiungi videoconferenza di Google Meet">` / "Add Google Meet video conferencing".
  3. `browser_snapshot` — the button is replaced by a Meet link display.
  4. Save.

  ### TASK: Check if a time slot is free ("am I free tomorrow at 3pm?")
  1. `browser_navigate` to `/calendar/u/0/r/day/YYYY/M/D` for the target day.
  2. `browser_snapshot`.
  3. Scan event button aria-labels. Each label starts with "START to END". Check if any event overlaps the target time.
  4. Report result.

  ### TASK: Create event with attachment
  1. Use TASK "Create a simple event" via URL prefill to reach the full editor.
  2. `browser_click` `<button "Aggiungi un allegato di Google Drive">` / "Add Google Drive attachment".
  3. This opens the Drive picker (separate modal). If the file is NOT in Drive, abort and tell the user to upload it manually, or use a Drive-hosted file.
  4. Save.

  ### TASK: Switch view (day/week/month/agenda/year)
  Press the corresponding shortcut: `1`/`d` day, `2`/`w` week, `3`/`m` month, `4`/`x` custom, `5`/`a` agenda, `6`/`y` year.
  OR navigate directly: `/calendar/u/0/r/{view}`.

  ### TASK: Jump to today
  Press `t` OR navigate to `/calendar/u/0/r/{current_view}` with no date.

  ### TASK: Jump to a specific date
  Navigate to `/calendar/u/0/r/{view}/YYYY/M/D`. This is faster than using the `g` dialog.

  ### TASK: Respond to an invite (Yes/No/Maybe)
  1. Navigate to the day containing the invite.
  2. `browser_click` the event `<button>` — peek popup opens.
  3. The peek contains RSVP buttons (`<button "Sì">` / "Yes", `<button "Forse">` / "Maybe", `<button "No">`) for invites you haven't responded to. Click one.
  4. `browser_snapshot` — confirm.
  Note: if you don't see RSVP buttons in the peek, the event was created by you (you're the organizer) — there's nothing to RSVP to.

  ### TASK: Toggle a calendar on/off (show/hide a calendar)
  1. In the left sidebar, find the `<checkbox "CALENDAR_NAME">` under "My calendars" / "Other calendars".
  2. `browser_click` the checkbox.
  3. `browser_snapshot` — grid updates.

  ---

  ### Common Gotchas
  - **Locale is unknown and always will be**: Google Calendar's UI is fully translated. NEVER hardcode English (or any language) text as a selector. URL paths, keyboard shortcuts, and structural attributes are your ONLY stable handles.
  - **URL navigation replaces clicks**: view switching, date jumps, search, and NEW event creation can all be done with a single `browser_navigate` call. Use it first, every time.
  - **Month and day numbers in URLs have no leading zeros**: `/r/week/2026/4/14` not `/r/week/2026/04/14`.
  - **eventedit URL params MUST be URL-encoded**: spaces → `%20`, `&` → `%26`, `:` → `%3A`, `/` in the value → `%2F`, `=` → `%3D`, etc.
  - **`dates=` format is local time, no Z**: `20260414T150000/20260414T160000`. For all-day: `20260414/20260415` (end is EXCLUSIVE — a single-day all-day event uses the next day as the end).
  - **Quick Add does NOT parse natural language in the title field**: typing "Lunch tomorrow 1pm" as the title does NOT set the time. This is why URL prefill exists — skip Quick Add entirely.
  - **Ctrl+Enter saves ONLY in the full editor**, not in the Quick Add dialog. This is another reason to navigate straight to `/r/eventedit` instead of using Quick Add.
  - **Picking a start time auto-adjusts end time by +1 hour**: if you set the start via picker, verify the end before saving.
  - **Backspace deletes immediately with no confirmation**. The delete is undoable via the toast's undo button for a few seconds. Verify which event is focused (look for `focusable focused` attributes) BEFORE pressing Backspace.
  - **Peek popup is modal and captures Esc**: one Esc closes the peek and returns you to the grid with the event still focused.
  - **Quick Add draws a provisional event on the grid** while the dialog is open. The provisional event has extra text in its aria-label (something ending with an ellipsis, indicating "creating…"). Don't treat it as a saved event — wait for the dialog to close and the text suffix to disappear.
  - **Deleted events leave focus on the next event**: after Backspace, the next event in the grid becomes the new `focusable focused` element. Don't accidentally delete it too.
  - **Time combobox accepts typing**: click the combobox and type "3:00PM" + Enter, instead of scrolling through 96 options.
  - **Date textbox accepts locale-formatted typing**: `14/4/2026`, `4/14/2026`, or `Apr 14 2026` can all work depending on the user's locale — BUT you don't need to worry about this because URL prefill makes date typing unnecessary.
  - **Invite status shows in the aria-label**: one of the comma-separated fields indicates whether you accepted/declined/are awaiting response. The specific words are locale-dependent — if you need to find "pending invites", match by structural position (after creator, before location) and let the user's question tell you which status they care about, rather than hardcoding status words.
  - **Subscribed calendar events (holidays, birthdays) have a different aria-label shape**: their structure replaces creator/status with something like "Calendar: NAME". You cannot delete them from the main grid (they belong to read-only calendars).
  - **Account picker `/u/0/`**: the first Google account. If the user has multiple accounts, they may want `/u/1/`, `/u/2/`, etc. Default to `/u/0/` unless told otherwise.
  - **Timezone matters for `dates=` in eventedit URLs**: times are interpreted in the account's calendar timezone unless you pass `ctz=IANA_TIMEZONE`. When in doubt, pass `ctz` explicitly to avoid ambiguity.
  - **You cannot hand-construct a `/r/eventedit/BASE64` URL for an existing event**: the BASE64 ID is opaque. To edit an existing event, navigate to the day, click the event (peek opens), click the Edit button in the peek (structurally, not by text).
  - **Search URL is `/r/search?q=URL_ENCODED_QUERY`**: one navigate — no need to press `/` and type.

  ### Rules (MUST follow — violations waste time)
  1. ONLY use: browser_navigate, browser_snapshot, browser_click, browser_type, browser_scroll, browser_upload_file. Nothing else.
  2. browser_evaluate is BANNED. browser_screenshot is BANNED. Do not use them under any circumstances — if you are tempted to, STOP and re-read the template.
  3. **Create events ONLY via URL prefill** at `/r/eventedit?text=...&dates=...`. Do NOT click the Create button. Do NOT click grid cells. Do NOT use Quick Add. There is no fallback — if the prefill URL doesn't give you a valid editor, report the failure to the user.
  4. **Check the calendar / switch views / jump dates ONLY via URL navigation** (`/r/day`, `/r/week/YYYY/M/D`, `/r/search?q=...`). Keyboard shortcuts are a secondary option only if URL navigation isn't applicable.
  5. **NEVER match elements by literal locale text.** Not English, not Italian, not any other language. Match by ROLE + structural attributes + position. Text in this template is DOCUMENTATION of what exists, not a selector.
  6. Event aria-labels follow a consistent pattern: time range first (or all-day marker), then title, creator, status, location, date, all comma-separated. The specific separator word and all-day marker are locale-dependent — parse by commas and positions, not by literal words.
  7. The `<main>` element's aria description always contains the current period label AND a digit (event count). This is your primary STATE indicator and it's locale-agnostic in structure even though locale-dependent in text — extract the number, don't depend on the surrounding words.
  8. After clicking an event, a modal `<dialog>` appears whose `name` EQUALS the event title (your own string — language-free). Inside, find action buttons by role and position, not by name. The FIRST non-close action button in the peek is Edit; the SECOND is Delete. Confirm by position.
  9. After EVERY mutating action (save/delete/edit), do ONE `browser_snapshot` and verify the URL changed appropriately (e.g. `/r/eventedit` disappearing after save, or the focused event's aria-label no longer present after delete). URL and tree changes are authoritative — do not rely on toast text.
  10. When the user gives a RELATIVE date ("next Monday", "tomorrow") AND a specific day number, VERIFY consistency before acting. If they conflict (e.g. "Monday April 14" when April 14 is a Tuesday), ASK the user which they meant. Do not silently pick one.
  11. After 2 consecutive failed attempts to locate or interact with an element, STOP. Do not invent workarounds, do not use browser_evaluate, do not try random clicks. Tell the user what you saw and what you expected.
  12. Budgets: create event ≤ 4 tool calls. Check day/week ≤ 2 tool calls. Delete event ≤ 5 tool calls. Search ≤ 2 tool calls. If you exceed, you have departed from the recipe.
  9. If an element is not found after 2 retries, tell the user. Do NOT try workarounds with browser_evaluate or random clicking.
  10. Maximum tool calls for "create a simple event": 4 (navigate → snapshot → save → snapshot). Maximum for "check my day": 2 (navigate → snapshot). If you are above that, you are doing something wrong — recheck whether you should be using URL navigation instead.
