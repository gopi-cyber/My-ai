description: Google Calendar — create, edit, delete, search, reschedule events and meetings. Manage schedule, respond to invites, navigate dates/views.
version: 1
instructions: |
  URL: https://calendar.google.com/calendar/u/0/r

  ### CRITICAL RULES — READ BEFORE DOING ANYTHING
  1. ONLY use: browser_navigate, browser_snapshot, browser_click, browser_type, browser_scroll, browser_upload_file. That is it.
  2. NEVER use browser_evaluate. NEVER use browser_screenshot. Both are BANNED for Google Calendar with no exceptions. If you cannot complete the task with the 6 allowed tools, stop and report why — do NOT reach for evaluate or screenshot as a workaround.
  3. NEVER use desktop tools, sidecar tools, or any tool not listed in rule 1.
  4. **Google Calendar is a LOCALE-DEPENDENT app**: every button and aria-label is translated to the user's Google Account language (Italian, French, Japanese, Arabic, etc.). You have NO IDEA what language any given user runs. Therefore:
     - NEVER match elements by hardcoded English text like "Save", "Create", "Add guests", "More options".
     - NEVER match by Italian/other-locale text either — those are examples for this template, not selectors.
     - ALWAYS match by ROLE + STRUCTURAL ATTRIBUTES (tag, role, haspopup, expandable, focusable, position within the main/dialog, URL patterns, aria descriptions that contain stable numeric/structural data).
     - When locale-dependent text appears in this template, it is documentation (a hint that "this button exists and in English says X"), NOT a selector. You must rediscover it structurally in the actual snapshot.
  5. **URL navigation REPLACES clicking** for almost every task. URLs are identical in every locale and every account. They are the single most important technique in this template. Before every action, ask: "Is there a URL for this?" If yes, use it.
  6. **Keyboard shortcuts REPLACE clicking** for everything URL navigation can't cover. They are locale-independent keys.
  7. Task budgets — if you exceed these, STOP and re-read this template:
     - "Create a simple event" (title + start/end): **max 4 tool calls** (navigate-to-prefilled-eventedit → snapshot → save → snapshot).
     - "Check my day/week": **max 2 tool calls** (navigate-to-view → snapshot).
     - "Delete an event": **max 5 tool calls** (navigate-to-day → snapshot → click event → click delete → snapshot).
     - "Search for event": **max 2 tool calls** (navigate-to-search-url → snapshot).

  ### FORBIDDEN ACTIONS — DO NOT DO THESE (observed failure modes)
  The following are guaranteed time-wasters. If you are tempted by any of them, STOP and use a URL or keyboard shortcut instead.
  - **DO NOT click the big "Create" button** in the top-left. It opens a menu with Event/Task/Appointment in the user's locale — you don't know what the items say. Use `browser_navigate` to `/r/eventedit?text=...&dates=...` instead, OR press the keyboard shortcut `c` (which opens the full editor directly).
  - **DO NOT click on empty grid cells / time slots to create an event.** The click target is ambiguous (columnheader vs gridcell vs the time grid), the resulting dialog is the same Quick Add which has its own traps, and the time it places the event at depends on pixel position. Use URL prefill instead.
  - **DO NOT click "Insert into sidebar" / "Inserisci nella barra laterale" thinking it expands the dialog.** It pins the draft to the sidebar and does NOT reveal more fields. To get the full editor from Quick Add, click "More options" / "Altre opzioni" — but better yet, skip Quick Add entirely and navigate to `/r/eventedit?...` to land in the full editor directly.
  - **DO NOT click Save before you have verified every field** in a snapshot. Calendar will happily save an event with the default placeholder date/time if you rush, producing wrong-day wrong-time events.
  - **DO NOT try to fix a bad event by clicking on the grid**. Delete it via peek popup → Delete button (or Backspace on focused event), then recreate via URL prefill.
  - **DO NOT assume English button text**. Not "Save", not "Create", not "Add guests", not "Delete". Match structurally.
  - **DO NOT use browser_evaluate to scrape the DOM when you get lost.** Re-read the latest snapshot, or if truly stuck, navigate to a URL that resets state (`/r/week`).

  ### PRIMARY PATHS — USE THESE FOR EVERY TASK

  **1. Prefilled event creation via URL — THE ONLY acceptable path for "create event" tasks.**
  Google Calendar supports a documented URL template that opens the full event editor with fields prefilled. This bypasses the locale-dependent Create button, Quick Add dialog, and their traps.

  Base: `https://calendar.google.com/calendar/u/0/r/eventedit`

  Query parameters (URL-encoded):
  - `text=TITLE`                     — event title
  - `dates=YYYYMMDDTHHmmSS/YYYYMMDDTHHmmSS` — start/end in local time (no Z). For all-day: `YYYYMMDD/YYYYMMDD`. The end day is EXCLUSIVE for all-day.
  - `ctz=IANA/Timezone`              — timezone (e.g. `Europe/Rome`, `America/New_York`)
  - `details=DESCRIPTION`            — event description (can include HTML)
  - `location=LOCATION`              — location string
  - `add=email1@x.com,email2@x.com`  — guest emails (comma-separated)
  - `recur=RRULE:FREQ=WEEKLY;BYDAY=MO,WE` — recurrence rule
  - `crm=AVAILABLE`                  — set to AVAILABLE to mark as free (default is BUSY)

  Example — "Dentist tomorrow 3-4pm":
  `https://calendar.google.com/calendar/u/0/r/eventedit?text=Dentist&dates=20260412T150000/20260412T160000&ctz=Europe/Rome`

  Example with guest + Meet description:
  `https://calendar.google.com/calendar/u/0/r/eventedit?text=Sync%20with%20Sam&dates=20260415T100000/20260415T110000&add=sam@example.com&location=Online&details=Weekly%20sync`

  After navigating, you land in the FULL event editor with fields populated. Verify with `browser_snapshot`:
  - URL contains `/r/eventedit`
  - `<main>` has `description="Pagina di modifica eventi"` (Italian) / "Event edit page" (English) / etc. — in ALL locales this `<main>` is the only one with a long descriptive aria description while on /r/eventedit.
  - There is exactly one `<textbox>` near the top of the main region whose value equals your title. That's the title field — NOT a selector, just verification.
  - Then SAVE by pressing `Ctrl+Enter`. This keyboard shortcut is documented to save from the full editor and is locale-independent. Do NOT search for a Save button text. If `Ctrl+Enter` fails, only then fall back to clicking the primary button in the top-right of `<main>` (it is the ONLY non-expandable `<button>` in the top action bar of the event editor that is not the Cancel button).
  - After saving, snapshot and verify the URL has changed away from `/r/eventedit` AND a live region contains a short status text (the save confirmation toast). URL change is the reliable signal.

  **2. URL navigation (fastest for "check my X" tasks):**
  All views and dates are addressable by URL. No clicking needed.
  - Today in week view:   `/calendar/u/0/r/week`
  - Today in day view:    `/calendar/u/0/r/day`
  - Today in month view:  `/calendar/u/0/r/month`
  - Today in agenda/list: `/calendar/u/0/r/agenda`
  - Year view:            `/calendar/u/0/r/year`
  - 4-day custom view:    `/calendar/u/0/r/customday`
  - Specific date in week:  `/calendar/u/0/r/week/YYYY/M/D` (e.g. `/r/week/2026/4/14`)
  - Specific date in day:   `/calendar/u/0/r/day/YYYY/M/D`
  - Specific date in month: `/calendar/u/0/r/month/YYYY/M/D`
  - Specific date in agenda:`/calendar/u/0/r/agenda/YYYY/M/D`
  - Search events:          `/calendar/u/0/r/search?q=QUERY` (URL-encode QUERY)
  - New event editor:       `/calendar/u/0/r/eventedit`

  Month and day numbers have NO leading zeros (use `4` not `04`).

  **3. Keyboard shortcuts (locale-independent, instant):**
  Use these BEFORE looking for buttons. They work in every language.

  Navigation:
  - `t`        → jump to today
  - `n` or `j` → next period (next week / day / month)
  - `p` or `k` → previous period
  - `g`        → open "Go to date" dialog (textbox named "Data" / "Date")

  Views:
  - `1` or `d` → day view
  - `2` or `w` → week view
  - `3` or `m` → month view
  - `4` or `x` → custom 4-day view
  - `5` or `a` → agenda / schedule view
  - `6` or `y` → year view

  Actions:
  - `c`        → create event (opens full editor at /r/eventedit)
  - `q`        → open Quick Add dialog for an ALL-DAY event
  - `Shift+C`  → open Quick Add dialog for a TIMED event
  - `e`        → edit the focused event (opens full editor)
  - `Backspace` or `Delete` → delete the focused event (no confirmation — use Annulla/Undo in toast if wrong)
  - `Ctrl+S` or `Ctrl+Enter` → save (ONLY works inside the full editor, NOT in Quick Add)
  - `Ctrl+Z` or `z` → undo last action
  - `Esc`      → close dialog / back to grid

  Application:
  - `/`        → focus global search bar
  - `s`        → settings

  IMPORTANT: Ctrl+Enter does NOT save from the Quick Add dialog. It only saves from the full editor. In Quick Add you must click the Salva/Save button.

  ### LAYOUT
  Calendar has four regions:
  - **Top banner**: Today button, prev/next period, current period label, Search icon, Help, Settings menu, View switcher menu, Google apps launcher, account avatar.
  - **Create button**: a large expandable button sitting just below the banner (NOT inside it). Has `expandable haspopup="menu"` — clicking opens a menu with Event / Task / Appointment schedule.
  - **Left sidebar (drawer)**: mini-month navigator, booking pages section, "My calendars" checkbox list, "Other calendars" checkbox list.
  - **Main grid**: the current view (day/week/month/agenda/year). The `<main>` element has an aria description like "Settimana del X, N eventi" / "Week of X, N events" — this is a STATE INDICATOR.
  - **Right sidebar** (optional): tabs for Keep / Tasks / Contacts / Maps.

  ### State Recognition
  After navigating or snapshotting, check:
  - **Not signed in**: URL is `workspace.google.com/.../products/calendar/` or `accounts.google.com/...`. -> Tell user: "Google Calendar requires sign-in. Please log in manually." Stop.
  - **Loading**: `<main>` has no description or no columnheader/gridcell children. -> Wait 3s, snapshot again. Max 2 retries.
  - **Grid ready**: `<main>` has description ending in "N eventi" / "N events", and you see `role="columnheader"` day headers and `role="gridcell"` day slots. -> Ready.
  - **Event focused**: one of the event `<button>` elements has `focusable focused` attributes.
  - **Peek popup open**: a `<dialog modal>` exists whose name equals the event title; it contains a "Modifica evento" / "Edit event" button and an "Elimina evento" / "Delete event" button.
  - **Quick Add open**: `<dialog "Crea" modal>` or equivalent in locale, containing a textbox with placeholder like "Aggiungi titolo e orario" / "Add title and time".
  - **Full editor**: URL contains `/r/eventedit`, `<main description="Pagina di modifica eventi">` / "Event edit page". Has `<textbox "Titolo">` / "Title" and a large `<button "Salva">` / "Save".
  - **Search results**: URL is `/r/search?q=...`, `<main description="Risultati di ricerca. N eventi trovati.">` / "Search results. N events found."
  - **Go to date dialog**: `<dialog>` with `<textbox>` named "Data" / "Date" and a "Vai" / "Go" button.
  - **Action toast** (post-save/delete): a live region contains `StaticText "Evento salvato"` / "Event saved" or `"Evento eliminato"` / "Event deleted", plus an Annulla/Undo button.

  ### Element Reference (from REAL browser_snapshot output)

  **READ THIS FIRST**: Any text in quotes in this section is an EXAMPLE from ONE locale (Italian, where this template was captured). It is NOT a selector. The actual user's Calendar may be in any language — the button that says "Salva" in Italian says "Save" in English, "保存" in Japanese, "Enregistrer" in French, and so on. You MUST match elements by:
  1. **ROLE** (button, textbox, combobox, dialog, gridcell, columnheader, main, banner, checkbox)
  2. **STRUCTURAL ATTRIBUTES** (`expandable`, `haspopup="menu"`, `readonly`, `focusable focused`, `contenteditable`, `multiline`, `selected`, `pressed`, `autocomplete="list"`)
  3. **POSITION** within the a11y tree (first button in the banner, only non-expandable button inside the event-editor main, button that is child of a specific gridcell, etc.)
  4. **URL or aria-description patterns** that contain stable non-locale data (URL paths, numeric counts, date strings, structural keywords)

  If you find yourself matching on literal locale text, STOP — you are making a mistake that will break the moment someone runs Calendar in a different language. The only locale-independent textual content in Calendar is:
  - Keyboard shortcut hints inside aria-labels (rare — only a few, like "(Ctrl-Enter)" for save in some editors — Calendar does NOT have these)
  - Names of email addresses (user input)
  - Event titles the user created
  - URL paths
  Everything else is translated.

  **Top banner (<banner>):**
  - Drawer toggle: `<button expandable>` — first button, toggles left sidebar
  - Heading: `<h1>` = "Calendar"
  - Today: `<button>` — 1st action button after heading. Name contains today's date. PREFER pressing `t` instead.
  - Previous period: `<button>` — 2nd action button. PREFER pressing `p` or `k`.
  - Next period: `<button>` — 3rd action button. PREFER pressing `n` or `j`.
  - Current period label: `<StaticText>` e.g. "aprile 2026"
  - Search icon: `<button>` — icon button. PREFER pressing `/`.
  - Settings menu: `<button expandable haspopup="menu">` with gear icon
  - View switcher: `<button expandable haspopup="menu">` with `description` pointing to view change. Its NAME equals the current view ("Settimana"/"Week"). PREFER pressing `1`-`6`.

  **Create button (just below banner):**
  - `<button expandable haspopup="menu">` — the big Create button. Name is the locale word for "Create" (e.g. "Crea"). PREFER pressing `c`, `q`, or navigating to `/r/eventedit` directly.

  **Left sidebar (inside a <generic> after the Create button):**
  - Mini calendar prev/next month: `<button>` names contain "Previous month" / "Next month" equivalent.
  - Mini calendar day cells: `<button>` names like `"11, Sabato, oggi"` — `DAY_NUM, DAY_NAME[, today]`. Today has `pressed` attribute.
  - "My calendars" expand: `<button expandable expanded>`
  - Calendar toggle checkboxes: `<checkbox>` with calendar name
  - "Other calendars" expand: `<button expandable expanded>`
  - Add other calendars: `<button expandable haspopup="menu">`

  **Main grid — week/day/custom view:**
  - `<main description="Settimana del X, N eventi">` — aria description contains period label AND event count. Use this to get a quick count.
  - `<h1>` inside main — matches the description
  - Day column headers: `<columnheader>` (readonly) wrapping a `<button "DAY_NAME, DATE">`. The day marked "today" has "oggi" / "today" in its name.
  - All-day event slots (top of grid): `<gridcell "N evento di una giornata, DAY, DATE">` / "N all-day events" — one per day.
  - Timed event slots: `<gridcell "N evento, DAY, DATE">` / "N events" — one per day.
  - **Event buttons**: `<button>` children of gridcells. Aria-label pattern:
    `"START a END, TITLE, CREATOR, STATUS, LOCATION, DATE"` (Italian — "a" is "to")
    `"START to END, TITLE, CREATOR, STATUS, LOCATION, DATE"` (English)
    - Example: `"10AM a 11AM, Jarvis guide and use cases, Vieri Balboni, Invito accettato, Nessuna posizione, 7 aprile 2026"`
    - All-day events start with `"Tutto il giorno, "` / `"All day, "` instead of a time range.
    - Subscribed calendar events (holidays, birthdays) replace CREATOR/STATUS with `"Calendario: NAME"` / `"Calendar: NAME"`.
    - STATUS is one of: "Invito accettato"/"Accepted", "Richiede conferma"/"Awaiting", "Rifiutato"/"Declined", "Forse"/"Maybe", or absent for your own events.
  - Focused event has `focusable focused` attributes — press `e` to edit or `Backspace` to delete it immediately.

  **Main grid — month view:**
  - Same pattern, but each day cell is a `<gridcell>` containing multiple event buttons stacked.

  **Main grid — agenda/schedule view:**
  - Flat list. Events grouped by day `<button>` with date, each event rendered as a `<button>` with the same aria-label pattern above.

  **Main grid — search view (URL /r/search?q=...):**
  - `<main description="Risultati di ricerca. N eventi trovati.">` / "Search results. N events found."
  - Results grouped by day: `<button "DAY, DATE">` then event `<button>` buttons with the standard pattern.

  **Quick Add dialog (after pressing `q` or `Shift+C`):**
  - Dialog: `<dialog "Crea" modal>` / "Create"
  - Close: `<button "Chiudi">` / "Close"
  - Title textbox: `<textbox>` with placeholder "Aggiungi titolo e orario" / "Add title and time". NOTE: Does NOT parse natural language — you must set date/time separately.
  - Mode tabs: `<tab "Evento">` / "Event" (selected), `<tab "Attività">` / "Task", `<tab "Programma degli appuntamenti">` / "Appointment schedule"
  - Date/recurrence summary button: `<button expandable>` with text like "Saturday, 11 April - Saturday, 11 April Does not repeat" — click to expand the inline date picker.
  - Add time button: `<button>` name contains "Aggiungi orario" / "Add time" — click to convert all-day to timed and reveal start/end time comboboxes.
  - After "Add time" is clicked, these appear:
    - `<textbox "Data inizio">` / "Start date" — accepts typed date like `14/4/2026` (locale) or `Apr 14 2026`. Press Enter to commit. The main grid scrolls to that week.
    - `<combobox "Ora di inizio">` / "Start time" autocomplete list — options in 15-min increments ("3:00PM", "3:15PM"…). You can click an option OR type a value. Picking a start time auto-adjusts end time by 1 hour.
    - `<combobox "Ora di fine">` / "End time" — same
    - `<checkbox "Tutto il giorno">` / "All day"
    - `<button "Fuso orario">` / "Timezone"
    - `<combobox "Ricorrenza">` / "Recurrence" — "Non si ripete" / "Does not repeat", "Daily", "Weekly", etc.
  - Add guests: `<button "Aggiungi invitati" expandable>` / "Add guests" — click to reveal inline `<combobox "Invitati">` / "Guests". Type email address, then press Enter (browser_type with submit:true) to add as a chip.
  - Meet: `<button "Aggiungi videoconferenza di Google Meet">` / "Add Google Meet video conferencing" — toggle
  - Location: `<button "Aggiungi luogo" expandable>` / "Add location" — reveals inline combobox with autocomplete
  - Description: `<button "Aggiungi descrizione o un allegato di Google Drive" expandable>` / "Add description or Drive attachment"
  - Calendar/visibility/notification summary: `<button expandable>` with a long composite name — click to change
  - More options: `<button "Altre opzioni">` / "More options" — navigates to the full editor with current values preserved
  - Save: `<button "Salva">` / "Save" — click to save and close the dialog
  - Add to sidebar: `<button "Inserisci nella barra laterale">` — ignore

  Provisional placeholder on grid: while the Quick Add dialog is open a PROVISIONAL event button appears in the grid with the aria-label suffix "Creazione dell'evento in corso…" / "Creating event…". This is expected. It will be committed on save or removed on cancel.

  **Peek popup (click on an existing event in the grid):**
  - Dialog: `<dialog "EVENT_TITLE" modal>` — dialog name = event title
  - Close: `<button "Chiudi">` / "Close"
  - Edit: `<button "Modifica evento">` / "Edit event" — opens full editor
  - Delete: `<button "Elimina evento">` / "Delete event" — deletes immediately, shows undo toast
  - Email guests: `<button "Invia dettagli dell'evento per email">` / "Email event details"
  - Options menu: `<button "Opzioni" expandable haspopup="menu">` / "Options" — duplicate, print, publish, copy to another calendar
  - Heading: `<h1 "EVENT_TITLE">`
  - Date text: `<StaticText "DAY, DATE">`
  - Time text: `<StaticText "START - ENDPM">`
  - Invite by link: `<button "Invita tramite link">` / "Invite via link"
  - Reminder text: `<StaticText "N minutes before">`
  - Organizer: `<StaticText "Organizer: NAME">`

  **Full event editor (URL /r/eventedit or /r/eventedit/BASE64_ID):**
  - `<main description="Pagina di modifica eventi">` / "Event edit page"
  - Cancel: `<button "Annulla modifiche eventi">` / "Cancel changes"
  - Title: `<textbox "Titolo">` / "Title"
  - Save: `<button "Salva">` / "Save" — or press Ctrl+S / Ctrl+Enter
  - More actions: `<button "Altre azioni" expandable haspopup="menu">` / "More actions" — delete, duplicate, print
  - Start date: `<textbox "Data inizio">` value format "14 apr 2026" — accepts typed values + Enter
  - Start time: `<combobox "Ora di inizio">`
  - End time: `<combobox "Ora di fine">`
  - End date: `<textbox "Data fine">`
  - Timezone: `<button "Fuso orario">`
  - All-day: `<checkbox "Tutto il giorno">` / "All day"
  - Recurrence: `<combobox "Ricorrenza">` / "Recurrence"
  - Guests combobox: `<combobox "Invitati">` / "Guests" — type + Enter to add
  - Guest permissions (3 checkboxes): "modify event", "invite others", "see guest list"
  - Meet: `<button "Aggiungi videoconferenza di Google Meet">` / "Add Google Meet video conferencing"
  - Location: `<combobox "Aggiungi posizione">` / "Add location"
  - Notification method: `<combobox "Metodo di notifica">` / "Notification method" — "Notification" or "Email"
  - Notification amount: `<spinbutton "Minuti di anticipo per la notifica">` / "Minutes before"
